<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} — wiki</title>
  <link rel="stylesheet" href="/_theme/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h1><a href="/">wiki</a></h1>
    <form class="search-bar" action="/_search" method="get">
      <input name="q" placeholder="Search…" value="{{.Query}}">
      <button type="submit">Go</button>
    </form>
    <nav>
      {{range .Nav}}<a href="/{{.Path}}">{{.Title}}</a>
      {{end}}
    </nav>
  </aside>
  <main class="main">
    {{.ContentHTML}}
  </main>
</div>
</body>
</html>
