<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search — {{.WikiTitle}}</title>
  <link rel="stylesheet" href="/_theme/style.css">
  <script>
    (function(){
      var t=localStorage.getItem('dark');
      document.documentElement.dataset.theme=t||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
    })();
  </script>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1><a href="/">{{.WikiTitle}}</a></h1>
      <button class="dark-toggle" onclick="toggleDark()" aria-label="Toggle dark mode">◑</button>
    </div>
    <form class="search-bar" action="/_search" method="get" autocomplete="off">
      <input id="search-input" name="q" placeholder="Search…" value="{{.Query}}" aria-label="Search">
    </form>
    <div id="search-results" class="search-dropdown" hidden></div>
    <nav>
      {{range .Nav}}
        {{if .Title}}<div class="nav-section">{{.Title}}</div>{{end}}
        {{range .Links}}<a href="/{{.Path}}">{{.Title}}</a>
        {{end}}
      {{end}}
    </nav>
  </aside>
  <main class="main">
    <div class="search-results-page">
      <h2>Search: {{.Query}}</h2>
      {{if .Results}}
        {{range .Results}}
        <div class="search-result">
          <h3><a href="/{{.Path}}">{{.Title}}</a></h3>
          <div class="snippet">{{.Snippet}}</div>
        </div>
        {{end}}
      {{else}}
        <p class="no-results">No results for <strong>{{.Query}}</strong>.</p>
      {{end}}
    </div>
  </main>
</div>
<script src="/_theme/theme.js"></script>
</body>
</html>
