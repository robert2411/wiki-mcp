version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: wiki-mcp
    main: ./cmd/wiki-mcp
    binary: wiki-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: wiki-mcp
    ids:
      - wiki-mcp
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: wiki-mcp
    artifacts: archive
    args: ["$artifact", "--output", "cyclonedx-json=$document"]
    documents:
      - "{{ .ArtifactName }}.sbom.json"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: wiki-mcp
    repository:
      owner: robertstevens
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/robertstevens/wiki-mcp
    description: Personal wiki server with MCP integration
    license: MIT
    test: |
      system "#{bin}/wiki-mcp --version"
    install: |
      bin.install "wiki-mcp"
