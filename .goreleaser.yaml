version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: wiki-mcp
    main: ./cmd/wiki-mcp
    binary: wiki-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: wiki-mcp
    ids:
      - wiki-mcp
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: wiki-mcp
    artifacts: archive
    args: ["$artifact", "--output", "cyclonedx-json=$document"]
    documents:
      - "{{ .ArtifactName }}.sbom.json"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

dockers:
  - id: wiki-mcp-amd64
    ids:
      - wiki-mcp
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/robertstevens/wiki-mcp:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.source=https://github.com/robertstevens/wiki-mcp"

  - id: wiki-mcp-arm64
    ids:
      - wiki-mcp
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/robertstevens/wiki-mcp:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.source=https://github.com/robertstevens/wiki-mcp"

docker_manifests:
  - name_template: "ghcr.io/robertstevens/wiki-mcp:{{ .Version }}"
    image_templates:
      - "ghcr.io/robertstevens/wiki-mcp:{{ .Version }}-amd64"
      - "ghcr.io/robertstevens/wiki-mcp:{{ .Version }}-arm64"
  - name_template: "ghcr.io/robertstevens/wiki-mcp:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/robertstevens/wiki-mcp:{{ .Version }}-amd64"
      - "ghcr.io/robertstevens/wiki-mcp:{{ .Version }}-arm64"
  - name_template: "ghcr.io/robertstevens/wiki-mcp:{{ .Major }}"
    image_templates:
      - "ghcr.io/robertstevens/wiki-mcp:{{ .Version }}-amd64"
      - "ghcr.io/robertstevens/wiki-mcp:{{ .Version }}-arm64"
  - name_template: "ghcr.io/robertstevens/wiki-mcp:latest"
    skip_push: "{{ if .Prerelease }}true{{ end }}"
    image_templates:
      - "ghcr.io/robertstevens/wiki-mcp:{{ .Version }}-amd64"
      - "ghcr.io/robertstevens/wiki-mcp:{{ .Version }}-arm64"

brews:
  - name: wiki-mcp
    repository:
      owner: robertstevens
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/robertstevens/wiki-mcp
    description: Personal wiki server with MCP integration
    license: MIT
    test: |
      system "#{bin}/wiki-mcp --version"
    install: |
      bin.install "wiki-mcp"
